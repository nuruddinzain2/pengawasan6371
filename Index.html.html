<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengawasan SE2026 - BPS</title>
<style>
  :root { --primary:#2c3e50; --accent:#3498db; --success:#2ecc71; --warning:#f1c40f; --danger:#e74c3c; }
  body { font-family:'Segoe UI',sans-serif; margin:0; background:#f4f7f6; color:#333; }
  .container { max-width:600px; margin:0 auto; padding:15px; }
  .card { background:#fff; padding:20px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:20px; }
  h2 { margin-top:0; color:var(--primary); border-bottom:2px solid #eee; padding-bottom:10px; }
  .form-group { margin-bottom:15px; }
  label { display:block; margin-bottom:6px; font-weight:600; font-size:14px; color:#555; }
  input,select,textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; font-size:16px; }
  textarea { height:80px; resize:vertical; }
  button { padding:12px; border:none; border-radius:6px; font-size:16px; cursor:pointer; width:100%; margin-top:10px; font-weight:bold; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }
  .btn-warning { background:var(--warning); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-secondary { background:#95a5a6; color:#fff; }
  .hidden { display:none; }
  .list-item { padding:15px; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .list-item:hover { background:#f9f9f9; }
  .status { font-size:12px; padding:4px 10px; border-radius:12px; color:#fff; font-weight:bold; }
  .status-draft { background:#f39c12; }
  .status-final { background:#27ae60; }
  .info-box { background:#e8f4fd; padding:12px; border-left:4px solid var(--accent); margin-bottom:15px; font-size:14px; border-radius:4px; }
  .error-box { background:#fde8e8; padding:12px; border-left:4px solid var(--danger); margin-bottom:15px; font-size:14px; border-radius:4px; color:var(--danger); }
  .readonly-field { background:#f8f9fa; color:#666; font-weight:bold; }
  .foto-preview { max-width:100%; margin-top:10px; display:none; border-radius:8px; border:2px solid #eee; }
  .log-box { background:#1e1e1e; color:#0f0; padding:10px; border-radius:6px; font-family:monospace; font-size:11px; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
</style>
</head>
<body>

<div class="container">
  <div id="page-login" class="card">
    <h2>🔐 Login Pengawasan</h2>
    <div class="info-box">Masukkan 5 digit NIP belakang dan Email aktif Anda.</div>
    <div class="form-group">
      <label>5 Digit NIP Belakang</label>
      <input type="text" id="login-nip" maxlength="5" placeholder="Contoh: 12345" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Email (BPS)</label>
      <input type="email" id="login-email" placeholder="email@bps.go.id">
    </div>
    <div id="login-error" class="error-box hidden"></div>
    <button class="btn-primary" onclick="doLogin()">Login / Register</button>
    <button class="btn-secondary" onclick="testConnection()">🔍 Test Koneksi Server</button>
    <div id="log-box" class="log-box hidden"></div>
  </div>

  <div id="page-menu" class="card hidden">
    <h2>📊 Dashboard</h2>
    <div class="info-box">
      Taskforce: <b id="info-taskforce">-</b><br>
      Sisa Kuota TIM: <b id="info-kuota">-</b>
    </div>
    <button class="btn-primary" onclick="showPage('form'); resetForm();">➕ Input Laporan Baru</button>
    <button class="btn-warning" onclick="loadList('DRAFT')">📝 Lihat Daftar Draft</button>
    <button class="btn-success" onclick="loadList('FINAL')">✅ Lihat Laporan Final</button>
    <button class="btn-secondary" onclick="doLogout()">🚪 Logout</button>
  </div>

  <div id="page-form" class="card hidden">
    <h2 id="form-title">Input Laporan</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>Tanggal Pengawasan</label><input type="date" id="f-tanggal"></div>
    <div class="form-group"><label>TIM</label><select id="f-tim" onchange="onTimChange()"></select></div>
    <div class="form-group"><label>Tugas</label><select id="f-tugas"></select></div>
    <div class="form-group"><label>PML</label><select id="f-pml" onchange="onPmlChange()"></select></div>
    <div class="form-group"><label>PPL</label><select id="f-ppl" onchange="onPplChange()"></select></div>
    <div class="form-group"><label>SubSLS</label><select id="f-subsls" onchange="onSubSlsChange()"></select></div>
    <div class="info-box">
      <b>Detail SubSLS:</b><br>
      Kelurahan: <span id="f-kelurahan">-</span><br>
      Supervisor: <span id="f-supervisor">-</span><br>
      Total Assignment: <span id="f-totalAssignment">0</span> | KK: <span id="f-muatanKK">0</span> | Usaha: <span id="f-muatanUsaha">0</span><br>
      Total Muatan: <span id="f-totalMuatan">0</span>
    </div>
    <div class="form-group"><label>Uraian Kegiatan</label><textarea id="f-uraian"></textarea></div>
    <div class="form-group">
      <label>Koordinat Lokasi</label>
      <input type="text" id="f-koordinat" class="readonly-field" readonly>
      <button class="btn-secondary" style="width:auto;padding:8px 15px;" onclick="getLocation()">📍 Ambil GPS</button>
    </div>
    <div class="form-group">
      <label>Foto Dokumentasi</label>
      <input type="file" id="f-foto" accept="image/*" capture="environment" onchange="handleFoto(this)">
      <img id="foto-preview" class="foto-preview">
    </div>
    <div class="form-group"><label>Nomor Surat Tugas</label><input type="text" id="f-nomorSurat"></div>
    <div class="form-group"><label>Tanggal Surat Tugas</label><input type="date" id="f-tanggalSurat"></div>
    <button class="btn-warning" onclick="saveData('DRAFT')">💾 Simpan Draft</button>
    <button class="btn-success" onclick="saveData('FINAL')">✅ Submit Final</button>
    <button class="btn-danger" onclick="showPage('menu')">❌ Batal</button>
  </div>

  <div id="page-list" class="card hidden">
    <h2 id="list-title">Daftar Laporan</h2>
    <div id="list-container"></div>
    <button class="btn-secondary" onclick="showPage('menu')">⬅️ Kembali</button>
  </div>
</div>

<script>
// GANTI URL INI DENGAN URL DEPLOYMENT TERBARU ANDA!
const API_URL = "GANTI_DENGAN_URL_APPS_SCRIPT_TERBARU";

const state = { taskforce:'', email:'', nip:'', editId:null, base64:null, fileName:null, currentFotoFileId:null, currentFotoUrl:null };

function log(msg){
  const box = document.getElementById('log-box');
  box.classList.remove('hidden');
  box.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
}

function showError(msg){
  const el = document.getElementById('login-error');
  el.innerText = msg;
  el.classList.remove('hidden');
  log('ERROR: '+msg);
  setTimeout(()=>el.classList.add('hidden'), 8000);
}

function showPage(page){
  document.querySelectorAll('.card').forEach(el=>el.classList.add('hidden'));
  document.getElementById('page-'+page).classList.remove('hidden');
}

async function api(action, data={}){
  try{
    log(`API → ${action}`);
    const res = await fetch(API_URL, {
      method:'POST',
      body: JSON.stringify({action, ...data}),
      headers:{'Content-Type':'text/plain;charset=utf-8'}
    });
    const text = await res.text();
    log(`API ← ${action}: ${text.substring(0,200)}`);
    try{
      return JSON.parse(text);
    }catch(pe){
      log('PARSE ERROR: '+text);
      return {success:false, message:'Response bukan JSON: '+text.substring(0,100)};
    }
  }catch(err){
    log('FETCH ERROR: '+err.message);
    return {success:false, message:'Koneksi gagal: '+err.message};
  }
}

async function testConnection(){
  log('Testing connection...');
  const res = await api('ping');
  if(res.success){
    alert('✅ Koneksi BERHASIL! Server time: '+res.time);
  }else{
    alert('❌ Koneksi GAGAL: '+res.message);
  }
}

async function doLogin(){
  const nip5 = document.getElementById('login-nip').value.trim();
  const email = document.getElementById('login-email').value.trim();
  if(!nip5 || nip5.length!==5) return showError('NIP harus 5 digit!');
  if(!email) return showError('Email wajib!');
  
  log('Login attempt: '+email);
  let res = await api('loginEmail', {email});
  
  if(res.success && res.taskforce){
    state.taskforce = res.taskforce;
    state.email = email;
    state.nip = nip5;
    alert('✅ Login berhasil! Taskforce: '+res.taskforce);
    enterDashboard();
  }else{
    log('Login gagal, mencoba register...');
    const regRes = await api('registerEmail', {nip5, email});
    if(regRes.success){
      const tfRes = await api('getTaskforceByNip', {nip5});
      if(tfRes.success && tfRes.taskforce){
        state.taskforce = tfRes.taskforce;
        state.email = email;
        state.nip = nip5;
        alert('✅ Registrasi berhasil! Taskforce: '+tfRes.taskforce);
        enterDashboard();
      }else{
        showError('NIP tidak ditemukan di database. Response: '+JSON.stringify(tfRes));
      }
    }else{
      showError('Login/Register gagal: '+regRes.message);
    }
  }
}

async function enterDashboard(){
  if(!state.taskforce){
    return showError('Taskforce kosong!');
  }
  document.getElementById('info-taskforce').innerText = state.taskforce;
  showPage('menu');
  await loadDropdowns();
}

function doLogout(){
  state.taskforce=''; state.email=''; state.nip='';
  document.getElementById('login-nip').value='';
  document.getElementById('login-email').value='';
  showPage('login');
}

function fillSelect(id, data){
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">-- Pilih --</option>';
  if(Array.isArray(data)){
    data.forEach(item=>{
      if(item){
        const safe = String(item).replace(/"/g,'&quot;');
        el.innerHTML += `<option value="${safe}">${safe}</option>`;
      }
    });
  }
  log(`Filled ${id}: ${data?.length || 0} items`);
}

async function loadDropdowns(){
  log('Loading dropdowns...');
  const [timRes, tugasRes, pmlRes] = await Promise.all([
    api('getTim'),
    api('getTugas'),
    api('getPML', {taskforce: state.taskforce})
  ]);
  log(`TIM: ${JSON.stringify(timRes).substring(0,100)}`);
  log(`TUGAS: ${JSON.stringify(tugasRes).substring(0,100)}`);
  log(`PML: ${JSON.stringify(pmlRes).substring(0,100)}`);
  
  fillSelect('f-tim', timRes);
  fillSelect('f-tugas', tugasRes);
  fillSelect('f-pml', pmlRes);
  await onPmlChange();
}

async function onPmlChange(){
  const pml = document.getElementById('f-pml').value;
  if(!pml){ fillSelect('f-ppl',[]); fillSelect('f-subsls',[]); return; }
  const res = await api('getPPL', {taskforce:state.taskforce, pml});
  fillSelect('f-ppl', res);
  await onPplChange();
}

async function onPplChange(){
  const ppl = document.getElementById('f-ppl').value;
  const pml = document.getElementById('f-pml').value;
  if(!ppl || !pml){ fillSelect('f-subsls',[]); return; }
  const res = await api('getSubSLS', {taskforce:state.taskforce, pml, ppl});
  fillSelect('f-subsls', res);
}

async function onSubSlsChange(){
  const subsls = document.getElementById('f-subsls').value;
  if(!subsls){
    ['f-kelurahan','f-supervisor'].forEach(id=>document.getElementById(id).innerText='-');
    ['f-totalAssignment','f-muatanKK','f-muatanUsaha','f-totalMuatan'].forEach(id=>document.getElementById(id).innerText='0');
    return;
  }
  const res = await api('getDetailSubSLS', {subsls});
  if(res.success && res.data){
    const d = res.data;
    document.getElementById('f-kelurahan').innerText = d['Kelurahan'] || d['KELURAHAN'] || '-';
    document.getElementById('f-supervisor').innerText = d['SUPERVISOR'] || '-';
    document.getElementById('f-totalAssignment').innerText = d['Total Assigment'] || d['TOTAL_ASSIGNMENT'] || 0;
    document.getElementById('f-muatanKK').innerText = d['Muatan Kk Wilkerstat'] || d['MUATAN_KK'] || 0;
    document.getElementById('f-muatanUsaha').innerText = d['Muatan Usaha WIlkerstat'] || d['MUATAN_USAHA'] || 0;
    document.getElementById('f-totalMuatan').innerText = d['Total Muatan Wilkerstat'] || d['TOTAL_MUATAN'] || 0;
  }
  const tim = document.getElementById('f-tim').value;
  if(tim){
    const kuotaRes = await api('hitungSisaKuota', {tim, taskforce:state.taskforce});
    if(kuotaRes.success) document.getElementById('info-kuota').innerText = kuotaRes.sisa;
  }
}

function onTimChange(){
  const tim = document.getElementById('f-tim').value;
  if(tim){
    api('hitungSisaKuota', {tim, taskforce:state.taskforce}).then(res=>{
      if(res.success) document.getElementById('info-kuota').innerText = res.sisa;
    });
  }
}

function resetForm(){
  document.getElementById('form-title').innerText = 'Input Laporan Baru';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-tanggal').value = new Date().toISOString().split('T')[0];
  ['f-uraian','f-koordinat','f-nomorSurat','f-tanggalSurat'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('foto-preview').style.display='none';
  document.getElementById('f-foto').value='';
  state.editId=null; state.base64=null; state.fileName=null;
  state.currentFotoFileId=null; state.currentFotoUrl=null;
  ['f-kelurahan','f-supervisor'].forEach(id=>document.getElementById(id).innerText='-');
  ['f-totalAssignment','f-muatanKK','f-muatanUsaha','f-totalMuatan'].forEach(id=>document.getElementById(id).innerText='0');
}

function handleFoto(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    state.fileName = input.files[0].name;
    reader.onload = e=>{
      state.base64 = e.target.result;
      const preview = document.getElementById('foto-preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>document.getElementById('f-koordinat').value=`${pos.coords.latitude}, ${pos.coords.longitude}`,
      err=>alert('GPS gagal: '+err.message)
    );
  }
}

async function saveData(status){
  const tim = document.getElementById('f-tim').value;
  const tugas = document.getElementById('f-tugas').value;
  const pml = document.getElementById('f-pml').value;
  const ppl = document.getElementById('f-ppl').value;
  const subsls = document.getElementById('f-subsls').value;
  if(!tim||!tugas||!pml||!ppl||!subsls) return alert('Lengkapi semua dropdown!');

  let fotoFileId = state.currentFotoFileId;
  let fotoUrl = state.currentFotoUrl;
  if(state.base64){
    alert('Mengupload foto...');
    const upRes = await api('uploadPhoto', {base64:state.base64, fileName:state.fileName, tim});
    if(upRes.success){ fotoFileId=upRes.fileId; fotoUrl=upRes.url; }
    else return alert('Upload gagal: '+upRes.message);
  }

  const data = {
    tanggal: document.getElementById('f-tanggal').value,
    tim, taskforce:state.taskforce, tugas, pml, ppl, subsls,
    kelurahan: document.getElementById('f-kelurahan').innerText,
    totalAssignment: document.getElementById('f-totalAssignment').innerText,
    muatanKK: document.getElementById('f-muatanKK').innerText,
    muatanUsaha: document.getElementById('f-muatanUsaha').innerText,
    totalMuatan: document.getElementById('f-totalMuatan').innerText,
    supervisor: document.getElementById('f-supervisor').innerText,
    sisaKuota: document.getElementById('info-kuota').innerText || 0,
    uraian: document.getElementById('f-uraian').value,
    koordinat: document.getElementById('f-koordinat').value,
    fotoFileId, fotoUrl,
    nomorSurat: document.getElementById('f-nomorSurat').value,
    tanggalSurat: document.getElementById('f-tanggalSurat').value
  };

  let res;
  if(state.editId){
    data.idRecord = state.editId;
    res = await api('updateData', {data});
  }else{
    res = await api(status==='DRAFT'?'saveDraft':'saveFinal', {data});
  }

  if(res.success){
    alert('✅ Berhasil disimpan!');
    showPage('menu');
  }else{
    alert('❌ Gagal: '+res.message);
  }
}

async function loadList(status){
  document.getElementById('list-title').innerText = status==='DRAFT'?'📝 Draft':'✅ Final';
  showPage('list');
  document.getElementById('list-container').innerHTML = '<p>Memuat...</p>';
  const res = await api(status==='DRAFT'?'getDraftList':'getFinalList', {taskforce:state.taskforce});
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  if(!res || !Array.isArray(res) || res.length===0){
    container.innerHTML = '<p>Tidak ada data.</p>';
    return;
  }
  res.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div>
        <b>${item.ID_RECORD||'-'}</b><br>
        📅 ${item.TANGGAL||'-'} | TIM: ${item.TIM||'-'}<br>
        📍 ${item.KELURAHAN||item.SUBSLS||'-'}
      </div>
      <span class="status status-${(item.STATUS||'').toLowerCase()}">${item.STATUS||'-'}</span>
    `;
    div.onclick = ()=>editData(item);
    container.appendChild(div);
  });
}

function editData(item){
  resetForm();
  showPage('form');
  document.getElementById('form-title').innerText = 'Edit Laporan';
  state.editId = item.ID_RECORD;
  state.currentFotoFileId = item.FOTO_FILE_ID;
  state.currentFotoUrl = item.FOTO_URL;
  document.getElementById('f-tanggal').value = item.TANGGAL;
  document.getElementById('f-tim').value = item.TIM;
  document.getElementById('f-tugas').value = item.TUGAS;
  document.getElementById('f-pml').value = item.PML;
  onPmlChange().then(()=>{
    document.getElementById('f-ppl').value = item.PPL;
    onPplChange().then(()=>{
      document.getElementById('f-subsls').value = item.SUBSLS;
      onSubSlsChange();
    });
  });
  document.getElementById('f-uraian').value = item.URAIAN;
  document.getElementById('f-koordinat').value = item.KOORDINAT;
  document.getElementById('f-nomorSurat').value = item.NOMOR_SURAT;
  document.getElementById('f-tanggalSurat').value = item.TANGGAL_SURAT;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM PELAPORAN LAPANGAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fdf6f0;
            font-family: Arial, sans-serif;
            /* Diubah: Memperbesar basis ukuran huruf utama */
            font-size: 16px;
        }
        .container {
            max-width: 800px;
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.1);
            border: 1px solid #ffe0b2;
        }
        .card-header {
            background-color: #e65100; /* ORANYE GELAP */
            color: #fff;
            text-align: center;
            /* Diubah: Memperbesar teks judul utama */
            font-size: 28px;
            font-weight: bold;
            border-top-left-radius: 10px !important;
            border-top-right-radius: 10px !important;
            text-transform: uppercase;
            padding: 20px;
        }
        .form-label {
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
            /* Diubah: Memperbesar huruf label form agar sangat jelas */
            font-size: 16px;
            margin-bottom: 8px;
        }
        /* Diubah: Memperbesar text input, select option, dan date picker */
        .form-control, .form-select {
            font-size: 16px;
            padding: 12px;
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #e65100;
            box-shadow: 0 0 0 0.25 block rgba(230, 81, 0, 0.25);
        }
        /* Diubah: Memperbesar teks tombol */
        .btn {
            font-size: 16px;
            padding: 10px 20px;
            font-weight: bold;
        }
        .btn-orange {
            background-color: #ff9800; /* ORANYE TERANG */
            color: white;
            border: none;
        }
        .btn-orange:hover {
            background-color: #e65100;
            color: white;
        }
        .btn-darkorange {
            background-color: #e65100;
            color: white;
            border: none;
        }
        .btn-darkorange:hover {
            background-color: #bf4300;
            color: white;
        }
        .info-box {
            background-color: #fff3e0;
            border-left: 5px solid #ff9800;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            /* Diubah: Memperbesar teks kotak informasi */
            font-size: 15px;
        }
        /* Diubah: Memperbesar badge status sisa kuota */
        .status-badge {
            font-size: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-aman { background-color: #d4edda; color: #155724; }
        .status-penuh { background-color: #f8d7da; color: #721c24; }
        
        /* Diubah: Memperbesar teks komponen riwayat laporan */
        .list-group-item {
            font-size: 15px;
            padding: 15px;
        }
        .list-group-item strong {
            font-size: 16px;
        }
        .text-muted {
            /* Diubah: Mencegah tulisan pembantu menjadi terlalu kecil */
            font-size: 13px !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="stepLogin" class="card p-4 mb-4">
        <h2 class="text-center mb-4 fw-bold" style="color: #e65100; font-size: 24px;">VERIFIKASI PETUGAS LAPANGAN</h2>
        <div class="mb-3">
            <label for="loginNip" class="form-label">Masukkan NIP / ID Petugas Anda</label>
            <input type="text" class="form-control" id="loginNip" placeholder="Contoh: 19900101XXXXXXXXXX atau KODE_PETUGAS">
        </div>
        <button class="btn btn-darkorange w-100 py-3" onclick="verifikasiPetugas()">MASUK & LIHAT FORM</button>
        <div id="loginAlert" class="mt-3 text-center fw-bold text-danger" style="display:none; font-size: 16px;"></div>
    </div>

    <div id="mainSection" style="display: none;">
        
        <div class="card mb-4">
            <div class="card-header" id="formHeaderTitle">FORM PELAPORAN LAPANGAN</div>
            <div class="card-body p-4">
                
                <div class="info-box shadow-sm">
                    <div class="row">
                        <div class="col-md-6 mb-2"><strong>NAMA:</strong> <span id="infoNama" class="text-uppercase">-</span></div>
                        <div class="col-md-6 mb-2"><strong>JABATAN:</strong> <span id="infoJabatan" class="text-uppercase">-</span></div>
                        <div class="col-md-6 mb-2"><strong>WILAYAH TUGAS:</strong> <span id="infoWilayah" class="text-uppercase">-</span></div>
                        <div class="col-md-6"><strong>KODE TIM:</strong> <span id="infoKode" class="text-uppercase">-</span></div>
                    </div>
                </div>

                <form id="reportForm" onsubmit="submitForm(event)">
                    <input type="hidden" id="reportId">

                    <div class="mb-3">
                        <label for="reportKelurahan" class="form-label">Kelurahan Tujuan Tugas</label>
                        <select class="form-select" id="reportKelurahan" onchange="checkKuotaKelurahan()" required>
                            <option value="">-- PILIH KELURAHAN --</option>
                        </select>
                        <div id="kuotaStatusArea" class="mt-2" style="display: none;">
                            <span id="kuotaBadge" class="status-badge"></span>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="reportTanggalBerangkat" class="form-label">Tanggal Berangkat</label>
                            <input type="date" class="form-control" id="reportTanggalBerangkat" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="reportTanggalPulang" class="form-label">Tanggal Pulang</label>
                            <input type="date" class="form-control" id="reportTanggalPulang" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="reportKeterangan" class="form-label">Keterangan / Catatan Progress Lapangan</label>
                        <textarea class="form-control" id="reportKeterangan" rows="4" placeholder="Tuliskan laporan singkat pelaksanaan target atau kendala lapangan di sini..." required></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" id="btnSubmit" class="btn btn-orange flex-grow-1 py-3">KIRIM LAPORAN BARU</button>
                        <button type="button" id="btnBatalEdit" class="btn btn-secondary py-3" style="display: none;" onclick="resetFormToNormal()">BATAL EDIT</button>
                    </div>
                </form>

            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white" style="font-size: 22px; padding: 15px;">RIWAYAT LAPORAN SAYA</div>
            <div class="card-body p-0">
                <div id="riwayatContainer" class="p-3">
                    <div class="text-center text-muted py-3">Memuat riwayat data laporan...</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // URL Web App Google Apps Script Anda
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvobKQXr2BSDni30i9NHEn6AYenz4m5rqTAbrkYto31JUUX8xhJOjXJ3zrFscLFsS6-A/exec";

    let currentPetugas = null;
    let daftarLaporanPetugas = [];
    let databaseKuotaKelurahan = {};

    // 1. FORMAT TANGGAL YANG AMAN (Diubah: Menggunakan kalender lokal browser/HP secara ketat tanpa UTC)
    function getToday() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 2. VERIFIKASI DATA PETUGAS (LOGIN)
    function verifikasiPetugas() {
        const nip = document.getElementById('loginNip').value.trim();
        const alertBox = document.getElementById('loginAlert');
        
        if(!nip) {
            alertBox.textContent = "NIP atau ID Petugas tidak boleh kosong!";
            alertBox.style.display = "block";
            return;
        }

        alertBox.style.display = "none";
        document.getElementById('loadingOverlay')?.remove();
        
        const loader = document.createElement('div');
        loader.id = "loadingOverlay";
        loader.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold; font-size:20px;";
        loader.innerHTML = '<div>🔄 Sedang memverifikasi ID Petugas...</div>';
        document.body.appendChild(loader);

        fetch(`${SCRIPT_URL}?action=getPetugasInfo&nip=${encodeURIComponent(nip)}`)
            .then(res => res.json())
            .then(response => {
                loader.remove();
                if(response.error) {
                    alertBox.textContent = response.error;
                    alertBox.style.display = "block";
                } else {
                    currentPetugas = response.petugas;
                    databaseKuotaKelurahan = response.kuotaKelurahan || {};
                    
                    // Simpan NIP di browser agar tidak perlu mengetik ulang saat refresh halaman
                    try { localStorage.setItem('lastNip', nip); } catch(e){}

                    document.getElementById('stepLogin').style.display = "none";
                    document.getElementById('mainSection').style.display = "block";

                    // Isi Kotak Info Petugas
                    document.getElementById('infoNama').textContent = currentPetugas.Nama || '-';
                    document.getElementById('infoJabatan').textContent = currentPetugas.Jabatan || '-';
                    document.getElementById('infoWilayah').textContent = currentPetugas.Wilayah_Tugas || '-';
                    document.getElementById('infoKode').textContent = currentPetugas.Kode_Tim || '-';

                    buildKelurahanDropdown();
                    renderRiwayatLaporan(response.riwayatLaporan || []);
                }
            })
            .catch(err => {
                loader.remove();
                alertBox.textContent = "Gagal terhubung ke server. Periksa koneksi internet Anda.";
                alertBox.style.display = "block";
            });
    }

    // 3. MEMBUAT LIST PILIHAN KELURAHAN BERDASARKAN DATABASE KUOTA
    function buildKelurahanDropdown() {
        const select = document.getElementById('reportKelurahan');
        select.innerHTML = '<option value="">-- PILIH KELURAHAN --</option>';
        
        Object.keys(databaseKuotaKelurahan).sort().forEach(kel => {
            const data = databaseKuotaKelurahan[kel];
            const opt = document.createElement('option');
            opt.value = kel;
            opt.textContent = `${kel.toUpperCase()} (Sisa Kuota: ${data.sisa})`;
            select.appendChild(opt);
        });
    }

    // 4. CEK AMBANG BATAS KUOTA KELURAHAN SAAT DIPILIH
    function checkKuotaKelurahan() {
        const kel = document.getElementById('reportKelurahan').value;
        const area = document.getElementById('kuotaStatusArea');
        const badge = document.getElementById('kuotaBadge');
        const btn = document.getElementById('btnSubmit');

        if(!kel || !databaseKuotaKelurahan[kel]) {
            area.style.display = "none";
            btn.disabled = false;
            return;
        }

        const data = databaseKuotaKelurahan[kel];
        area.style.display = "block";
        
        if(data.sisa <= 0) {
            badge.className = "status-badge status-penuh";
            badge.textContent = `❌ KUOTA PENUH (Maksimal target ${data.maks} laporan sudah terpenuhi)`;
            // Catatan: Jika ingin mengunci mutlak agar form tidak bisa dikirim saat kuota penuh, aktifkan baris di bawah ini:
            // btn.disabled = true;
        } else {
            badge.className = "status-badge status-aman";
            badge.textContent = `✅ KUOTA AMAN (Tersedia sisa slot untuk ${data.sisa} laporan)`;
            btn.disabled = false;
        }
    }

    // 5. UPDATE SISA KUOTA SECARA REALTIME DI SISI CLIENT
    function updateSisaKuota() {
        if(currentPetugas) {
            fetch(`${SCRIPT_URL}?action=getPetugasInfo&nip=${encodeURIComponent(currentPetugas.NIP)}`)
                .then(res => res.json())
                .then(response => {
                    if(response.kuotaKelurahan) {
                        databaseKuotaKelurahan = response.kuotaKelurahan;
                        const currentSelectValue = document.getElementById('reportKelurahan').value;
                        buildKelurahanDropdown();
                        document.getElementById('reportKelurahan').value = currentSelectValue;
                        checkKuotaKelurahan();
                    }
                }).catch(e => {});
        }
    }

    // 6. PROSES KIRIM DATA (SIMPAN BARU / UPDATE EDIT)
    function submitForm(e) {
        e.preventDefault();
        
        const id = document.getElementById('reportId').value;
        const kelurahan = document.getElementById('reportKelurahan').value;
        const tglBerangkat = document.getElementById('reportTanggalBerangkat').value;
        const tglPulang = document.getElementById('reportTanggalPulang').value;
        const keterangan = document.getElementById('reportKeterangan').value.trim();

        if(!kelurahan || !tglBerangkat || !tglPulang || !keterangan) {
            alert("Harap isi seluruh field form laporan dengan benar!");
            return;
        }

        const loader = document.createElement('div');
        loader.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold; font-size:20px;";
        loader.innerHTML = '<div>💾 Sedang memproses dan menyimpan laporan ke Google Sheets...</div>';
        document.body.appendChild(loader);

        const actionType = id ? "updateReport" : "addReport";
        
        const payload = {
            action: actionType,
            id: id,
            nip: currentPetugas.NIP,
            nama: currentPetugas.Nama,
            jabatan: currentPetugas.Jabatan,
            wilayah_tugas: currentPetugas.Wilayah_Tugas,
            kode_tim: currentPetugas.Kode_Tim,
            kelurahan: kelurahan,
            tanggal_berangkat: tglBerangkat,
            tanggal_pulang: tglPulang,
            keterangan: keterangan
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            loader.remove();
            if(response.success) {
                alert(id ? "Laporan Anda berhasil diperbarui!" : "Laporan baru berhasil disimpan!");
                resetFormToNormal();
                
                // Refresh data riwayat dan kuota kelurahan terbaru
                if(response.riwayatLaporan) renderRiwayatLaporan(response.riwayatLaporan);
                updateSisaKuota();
            } else {
                alert("Gagal menyimpan data: " + (response.error || "Terjadi kesalahan sistem internal"));
            }
        })
        .catch(err => {
            loader.remove();
            alert("Terjadi gangguan jaringan internet. Gagal mengirim data ke server.");
        });
    }

    // 7. AMBIL DATA DAN MASUKKAN KE FORM UNTUK EDIT
    function editReport(id) {
        const report = daftarLaporanPetugas.find(r => r.ID === id);
        if(!report) {
            alert("Data laporan tidak ditemukan.");
            return;
        }

        // Ubah Judul & Tombol Form ke Mode Edit
        document.getElementById('formHeaderTitle').textContent = "⚠️ MODE EDIT LAPORAN";
        document.getElementById('formHeaderTitle').style.backgroundColor = "#d35400";
        document.getElementById('btnSubmit').textContent = "SIMPAN PERUBAHAN DATA";
        document.getElementById('btnSubmit').className = "btn btn-darkorange flex-grow-1 py-3";
        document.getElementById('btnBatalEdit').style.display = "block";

        // Masukkan value ke input form
        document.getElementById('reportId').value = report.ID;
        document.getElementById('reportKelurahan').value = report.Kelurahan;
        checkKuotaKelurahan();

        // Diubah: Logika pemotong string tanggal yang ketat (YYYY-MM-DD) agar tidak terpengaruh Timezone/Jam UTC
        if (report.Tanggal_Berangkat) {
            const tglBerangkat = report.Tanggal_Berangkat.includes('T') ? 
                                 report.Tanggal_Berangkat.split('T')[0] : 
                                 report.Tanggal_Berangkat.substring(0, 10);
            document.getElementById('reportTanggalBerangkat').value = tglBerangkat;
        }
        if (report.Tanggal_Pulang) {
            const tglPulang = report.Tanggal_Pulang.includes('T') ? 
                              report.Tanggal_Pulang.split('T')[0] : 
                              report.Tanggal_Pulang.substring(0, 10);
            document.getElementById('reportTanggalPulang').value = tglPulang;
        }

        document.getElementById('reportKeterangan').value = report.Keterangan || '';
        
        // Geser layar otomatis ke form atas agar petugas tahu form siap diedit
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 8. RESET FORM KEMBALI KE MODE NORMAL / DEFAULT
    function resetFormToNormal() {
        document.getElementById('formHeaderTitle').textContent = "FORM PELAPORAN LAPANGAN";
        document.getElementById('formHeaderTitle').style.backgroundColor = "#e65100";
        document.getElementById('btnSubmit').textContent = "KIRIM LAPORAN BARU";
        document.getElementById('btnSubmit').className = "btn btn-orange flex-grow-1 py-3";
        document.getElementById('btnBatalEdit').style.display = "none";

        document.getElementById('reportId').value = "";
        document.getElementById('reportForm').reset();
        
        document.getElementById('reportTanggalBerangkat').value = getToday();
        document.getElementById('reportTanggalPulang').value = getToday();
        document.getElementById('kuotaStatusArea').style.display = "none";
    }

    // 9. CETAK STRUK LAPORAN (PRINT)
    function printReport(id) {
        const report = daftarLaporanPetugas.find(r => r.ID === id);
        if(!report) return;

        const formatTgl = (str) => {
            if(!str) return '-';
            const raw = str.split('T')[0];
            const p = raw.split('-');
            if(p.length !== 3) return raw;
            return `${p[2]}/${p[1]}/${p[2]}`;
        };

        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
            <head>
                <title>Tanda Terima Laporan - ${report.ID}</title>
                <style>
                    body { font-family: Courier, monospace; padding: 20px; color: #000; line-height: 1.4; font-size: 14px; }
                    .ticket { max-width: 400px; margin: 0 auto; border: 1px dashed #000; padding: 15px; }
                    .center { text-align: center; font-weight: bold; }
                    .line { border-top: 1px dashed #000; margin: 10px 0; }
                    .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
                    .val { font-weight: bold; text-align: right; width: 60%; word-break: break-all; }
                </style>
            </head>
            <body onload="window.print()">
                <div class="ticket">
                    <div class="center">TANDA TERIMA BUKTI LAPORAN</div>
                    <div class="center">SISTEM MONITORING LAPANGAN</div>
                    <div class="line"></div>
                    <div class="row"><span>ID LAPORAN:</span><span class="val">${report.ID}</span></div>
                    <div class="row"><span>WAKTU ENTRI:</span><span class="val">${report.Timestamp ? report.Timestamp.replace('T',' ').substring(0,19) : '-'}</span></div>
                    <div class="line"></div>
                    <div class="row"><span>NIP:</span><span class="val">${report.NIP}</span></div>
                    <div class="row"><span>PETUGAS:</span><span class="val">${report.Nama_Petugas}</span></div>
                    <div class="row"><span>TIM:</span><span class="val">${report.Kode_Tim}</span></div>
                    <div class="row"><span>KELURAHAN:</span><span class="val">${report.Kelurahan}</span></div>
                    <div class="row"><span>BERANGKAT:</span><span class="val">${formatTgl(report.Tanggal_Berangkat)}</span></div>
                    <div class="row"><span>PULANG:</span><span class="val">${formatTgl(report.Tanggal_Pulang)}</span></div>
                    <div class="line"></div>
                    <div><strong>KETERANGAN PROGRESS:</strong></div>
                    <div style="margin-top:5px; text-align:justify; background:#f5f5f5; padding:5px;">${report.Keterangan || '-'}</div>
                    <div class="line"></div>
                    <div class="center">TERIMA KASIH ATAS LAPORAN ANDA</div>
                    <div class="center">TETAP SEMANGAT DI LAPANGAN</div>
                </div>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    // 10. MENAMPILKAN DAFTAR RIWAYAT LAPORAN KE HALAMAN
    function renderRiwayatLaporan(data) {
        const container = document.getElementById('riwayatContainer');
        daftarLaporanPetugas = data || [];

        const formatTgl = (str) => {
            if(!str) return '-';
            const clean = str.split('T')[0]; // Diubah: Selalu potong string di huruf T agar tanggal murni
            const parts = clean.split('-');
            if(parts.length !== 3) return clean;
            return `${parts[2]}/${parts[1]}/${parts[0]}`; // Ubah urutan ke DD/MM/YYYY
        };

        try {
            if (daftarLaporanPetugas.length > 0) {
                let html = '<ul class="list-group list-group-flush">';
                daftarLaporanPetugas.forEach((r, index) => {
                    html += `
                    <li class="list-group-item border-bottom py-3">
                        <div class="d-flex justify-content-between align-items-start mb-1 flex-wrap">
                            <span class="text-uppercase fw-bold text-dark" style="font-size: 16px;">📍 KEL. ${r.Kelurahan}</span>
                            <span class="badge bg-dark text-white p-2" style="font-size: 12px;">ID: ${r.ID}</span>
                        </div>
                        <div class="text-muted mb-2">
                            🗓️ <strong>Tgl Tugas:</strong> ${formatTgl(r.Tanggal_Berangkat)} s/d ${formatTgl(r.Tanggal_Pulang)}
                        </div>
                        <div class="p-2 rounded bg-light border text-dark" style="font-size: 15px; white-space: pre-line; text-align: justify;">
                            ${r.Keterangan || '-'}
                        </div>
                        <div class="d-flex gap-2 mt-2">
                            <button type="button" class="btn btn-outline-primary btn-sm fw-bold px-3 py-2" onclick="editReport('${r.ID}')">✏️ EDIT</button>
                            <button type="button" class="btn btn-outline-dark btn-sm fw-bold px-3 py-2" onclick="printReport('${r.ID}')">🖨️ PRINT STRUK</button>
                        </div>
                    </li>`;
                });
                html += '</ul>';
                container.innerHTML = html;
            } else { 
                container.innerHTML = '<div class="small text-muted py-4 text-center fw-bold fs-5">BELUM ADA DATA LAPORAN MASUK.</div>'; 
            }
        } catch (e) { 
            container.innerHTML = '<div class="small text-danger text-center fw-bold py-3">GAGAL MEMUAT RIWAYAT LAPORAN.</div>'; 
        }
    }

    // EVENT SAAT HALAMAN PERTAMA KALI DIKUNJUNGI
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('reportTanggalBerangkat').value = getToday();
        document.getElementById('reportTanggalPulang').value = getToday();

        // Autofill NIP jika sebelumnya petugas sudah pernah login sukses di HP ini
        try {
            const savedNip = localStorage.getItem('lastNip');
            if (savedNip) {
                document.getElementById('loginNip').value = savedNip;
            }
        } catch (e) {}
    });
</script>
</body>
</html>

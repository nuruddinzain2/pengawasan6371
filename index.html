<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Taskforce SE2026</title>
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#FFF8F2; color:#2D2D2D; }
    header { background:#1B3A5C; color:white; padding:1rem; text-align:center; font-weight:bold; }
    .btn { background:#E66A1F; color:white; border:none; padding:0.75rem 1rem; border-radius:4px; font-size:1rem; cursor:pointer; margin-right:0.5rem; }
    .form-group { margin:1rem 0; }
    label { display:block; margin-bottom:0.5rem; font-weight:bold; }
    input, select, textarea { width:100%; padding:0.75rem; border:1px solid #E0E0E0; border-radius:4px; font-size:1rem; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#1B3A5C; display:flex; justify-content:space-around; padding:0.5rem 0; }
    nav button { background:none; border:none; color:white; font-size:0.9rem; }
    .status-final { color:#2E7D4F; font-weight:bold; }
    .error { color:red; font-weight:bold; }
    .success { color:green; font-weight:bold; }
  </style>
</head>
<body>
  <header>LAPORAN HASIL TASKFORCE SENSUS EKONOMI 2026</header>

  <main style="padding:1rem;">
    <!-- Login Section -->
    <section id="login-section">
      <h2>Login</h2>
      <div class="form-group">
        <label for="nipLast5">Masukkan 5 digit terakhir NIP</label>
        <input type="text" id="nipLast5" placeholder="Contoh: 5349">
      </div>
      <button class="btn" onclick="login()">Login</button>
      <p id="login-message"></p>
    </section>

    <!-- Report Form Section -->
    <section id="report-section" style="display:none;">
      <h2>Buat Laporan</h2>
      <div class="form-group"><label for="tanggal">Tanggal</label><input type="date" id="tanggal"></div>
      <div class="form-group"><label for="tim">TIM</label><input type="text" id="tim"></div>
      <div class="form-group"><label for="pml">Nama PML</label><input type="text" id="pml"></div>
      <div class="form-group"><label for="ppl">Nama PPL</label><input type="text" id="ppl"></div>
      <div class="form-group"><label for="subsls">ID SubSLS</label><input type="text" id="subsls"></div>
      <div class="form-group"><label for="assignment">Total Assignment</label><input type="number" id="assignment"></div>
      <div class="form-group"><label for="muatanKK">Muatan KK Wilkerstat</label><input type="number" id="muatanKK"></div>
      <div class="form-group"><label for="muatanUsaha">Muatan Usaha Wilkerstat</label><input type="number" id="muatanUsaha"></div>
      <div class="form-group"><label for="totalMuatan">Total Muatan Wilkerstat</label><input type="number" id="totalMuatan"></div>
      <div class="form-group"><label for="tugas">Tugas</label><select id="tugas"></select></div>
      <div class="form-group"><label for="uraian">Uraian Kegiatan</label><textarea id="uraian"></textarea></div>
      <div class="form-group"><label for="kunjungan">Jumlah Kunjungan</label><input type="number" id="kunjungan"></div>

      <!-- Foto Upload -->
      <div class="form-group">
        <label for="fotoFile">Upload Foto (otomatis resize max 1024px)</label>
        <input type="file" id="fotoFile" accept="image/*" onchange="compressAndUpload()">
        <input type="hidden" id="foto"> <!-- hasil link Drive -->
        <p id="foto-status"></p>
      </div>

      <div class="form-group"><label for="koordinat">Koordinat</label><input type="text" id="koordinat"></div>
      <div class="form-group"><label for="nomorSurat">Nomor Surat Tugas</label><input type="text" id="nomorSurat"></div>
      <div class="form-group"><label for="tanggalSurat">Tanggal Surat Tugas</label><input type="date" id="tanggalSurat"></div>
      <button class="btn" onclick="submitReport('Draft')">Simpan Draft</button>
      <button class="btn" onclick="submitReport('Final')">Simpan Final</button>
      <p id="report-message"></p>
    </section>
  </main>

  <nav>
    <button onclick="showSection('login')">Login</button>
    <button onclick="showSection('report')">Laporan</button>
  </nav>

  <script>
    const WEBAPP_URL = "PASTE_YOUR_DEPLOYED_WEBAPP_URL_HERE";

    function showSection(section) {
      document.getElementById('login-section').style.display = section === 'login' ? 'block' : 'none';
      document.getElementById('report-section').style.display = section === 'report' ? 'block' : 'none';
    }

    async function login() {
      const nipLast5 = document.getElementById('nipLast5').value.trim();

      // Validasi input: harus 5 digit angka
      if (!/^\d{5}$/.test(nipLast5)) {
        document.getElementById('login-message').textContent = "❌ Masukkan tepat 5 digit angka.";
        document.getElementById('login-message').className = "error";
        return;
      }

      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "login", nipLast5 })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('login-message').textContent = "✅ Login berhasil!";
        document.getElementById('login-message').className = "success";
        showSection('report');
        loadTugasOptions();
      } else {
        document.getElementById('login-message').textContent = "❌ NIP salah atau tidak cocok.";
        document.getElementById('login-message').className = "error";
      }
    }

    async function loadTugasOptions() {
      const res = await fetch(WEBAPP_URL + "?action=getTugasOptions");
      const data = await res.json();
      const select = document.getElementById('tugas');
      select.innerHTML = "";
      data.data.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt;
        select.appendChild(option);
      });
    }

    async function compressAndUpload() {
      const fileInput = document.getElementById('fotoFile');
      if (!fileInput.files.length) return;
      const file = fileInput.files[0];
      const img = new Image();
      img.src = URL.createObjectURL(file);

      img.onload = async () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const scale = Math.min(1024 / img.width, 1024 / img.height, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const base64Data = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('foto-status').textContent = "Mengunggah foto...";
        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "uploadPhoto",
            filename: file.name,
            mimeType: "image/jpeg",
            base64Data
          })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('foto').value = data.directLink;
          document.getElementById('foto-status').textContent = "Foto berhasil diunggah.";
        } else {
          document.getElementById('foto-status').textContent = "

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM PELAPORAN LAPANGAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fdf6f0;
            font-family: Arial, sans-serif;
            /* Diubah: Memperbesar basis ukuran huruf utama */
            font-size: 16px;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.1);
            border: 1px solid #ffe0b2;
        }
        .card-header {
            background-color: #e65100; /* ORANYE GELAP */
            color: #fff;
            text-align: center;
            /* Diubah: Memperbesar teks judul card utama */
            font-size: 26px;
            font-weight: bold;
            border-top-left-radius: 10px !important;
            border-top-right-radius: 10px !important;
            text-transform: uppercase;
        }
        .form-label {
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
            /* Diubah: Memperbesar huruf label agar tegas dan jelas */
            font-size: 16px;
        }
        /* Diubah: Memperbesar teks di dalam form isian dan dropdown pilihan */
        .form-control, .form-select {
            font-size: 16px;
            padding: 10px;
        }
        /* Diubah: Memperbesar huruf di dalam tombol aksi utama */
        .btn-primary {
            background-color: #e65100;
            border-color: #e65100;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 16px;
            padding: 12px;
        }
        .btn-primary:hover {
            background-color: #ff9800;
            border-color: #ff9800;
        }
        .btn-secondary {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 16px;
            padding: 12px;
        }
        .nav-tabs .nav-link.active {
            background-color: #e65100;
            color: #fff;
            text-transform: uppercase;
        }
        .nav-tabs .nav-link {
            color: #e65100;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 15px;
        }
        .alert-info {
            background-color: #fff3e0;
            color: #e65100;
            border-color: #ffe0b2;
            /* Diubah: Memperbesar teks informasi NIP & Taskforce login */
            font-size: 16px;
        }
        .photo-preview {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border: 2px solid #ffb74d;
            padding: 5px;
            border-radius: 5px;
        }
        h5.section-title {
            color: #e65100;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid #ffe0b2;
            padding-bottom: 5px;
            margin-top: 15px;
            /* Diubah: Memperbesar teks pemisah bagian formulir */
            font-size: 18px;
        }

        /* Menu titik tiga (⋮) di setiap card laporan, untuk aksi yang
           sengaja dipisah jauh dari tombol EDIT (saat ini: HAPUS). */
        .report-menu-dropdown {
            position: absolute;
            top: 110%;
            right: 0;
            z-index: 20;
            background: #fff;
            border: 1px solid #ffe0b2;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            min-width: 170px;
            overflow: hidden;
        }
        .report-menu-item {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .report-menu-item:hover {
            background-color: #fff3e0;
        }

        /* Overlay modal konfirmasi (delete, peringatan final, dll). */
        .confirm-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1050;
            align-items: center;
            justify-content: center;
        }
        .confirm-modal-overlay.show {
            display: flex;
        }
        .confirm-modal-box {
            background: #fff;
            border-radius: 10px;
            max-width: 380px;
            width: 90%;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }
        .confirm-modal-box h6 {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .confirm-modal-box p {
            font-size: 15px;
            margin-bottom: 18px;
        }

        /* Highlight merah untuk field yang masih kosong saat SIMPAN DRAFT
           ditekan tapi ada isian wajib yang belum lengkap. */
        .field-kosong-warning {
            border: 2px solid #dc3545 !important;
            background-color: #fff5f5 !important;
        }

        /* Tombol PRINT hanya untuk laporan FINAL, dan hanya ditampilkan
           di layar lebar (PC/laptop). Disembunyikan di HP/tablet sempit. */
        .btn-print {
            display: none;
        }
        @media (min-width: 992px) {
            .btn-print {
                display: inline-block;
            }
        }

        /* Area cetak: tersembunyi total di layar normal, hanya ditampilkan
           browser saat proses print (window.print()). */
        .print-only {
            display: none;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            .print-only, .print-only * {
                visibility: visible;
            }
            .print-only {
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
            }
            .print-page {
                padding: 30px 40px;
                font-family: 'Times New Roman', Times, serif;
                color: #000;
            }
            .print-header {
                text-align: center;
                border-bottom: 3px double #000;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            .print-header h2 {
                margin: 0;
                font-size: 18px;
                letter-spacing: 1px;
            }
            .print-header p {
                margin: 2px 0;
                font-size: 13px;
            }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }
            .print-table td {
                padding: 6px 8px;
                border: 1px solid #000;
                vertical-align: top;
            }
            .print-table td.label {
                width: 35%;
                font-weight: bold;
                background-color: #f2f2f2;
            }
            .print-uraian {
                margin-top: 15px;
                font-size: 13px;
            }
            .print-uraian .kotak {
                border: 1px solid #000;
                min-height: 80px;
                padding: 8px;
                margin-top: 5px;
            }
            .print-foto img {
                max-width: 300px;
                max-height: 300px;
                margin-top: 10px;
                border: 1px solid #000;
            }
            .print-signature {
                margin-top: 50px;
                display: flex;
                justify-content: space-between;
            }
            .print-signature .sign-block {
                text-align: center;
                width: 250px;
            }
            .print-signature .sign-line {
                margin-top: 70px;
                border-top: 1px solid #000;
                padding-top: 4px;
                font-weight: bold;
            }
        }
        
        /* Tambahan: Memastikan teks riwayat list laporan berukuran proporsional besar */
        .list-group-item {
            font-size: 15px !important;
        }
        .form-text {
            font-size: 14px !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPanel" class="card">
        <div class="card-header">🔑 LOGIN PELAPORAN</div>
        <div class="card-body">
            <div id="loginAlert"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label for="loginNip" class="form-label">NIP (NOMOR INDUK PEGAWAI)</label>
                    <input type="text" id="loginNip" class="form-control" required>
                </div>
                
                <div class="mb-3" id="taskforceGroup" style="display: none;">
                    <label for="loginTaskforce" class="form-label">PILIH TASKFORCE</label>
                    <select id="loginTaskforce" class="form-select">
                        <option value="">-- PILIH TASKFORCE --</option>
                    </select>
                </div>

                <div class="mb-3" id="emailGroup" style="display: none;">
                    <label for="loginEmail" class="form-label">EMAIL AKTIF (REGISTRASI AWAL)</label>
                    <input type="email" id="loginEmail" class="form-control">
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary w-100">MASUK</button>
            </form>
        </div>
    </div>

    <div id="reportPanel" class="card" style="display: none;">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>📝 MENU UTAMA PELAPORAN</span>
            <button class="btn btn-danger btn-sm fw-bold" onclick="handleLogout()">KELUAR</button>
        </div>
        <div class="card-body">
            <div class="alert alert-info py-2 small">
                👤 NIP: <span id="userNipDisplay" class="fw-bold"></span> | 💼 TASKFORCE: <span id="userTaskforceDisplay" class="fw-bold"></span>
            </div>

            <ul class="nav nav-tabs mb-3" id="reportTabs">
                <li class="nav-item">
                    <button id="tabFormBtn" class="nav-link active" onclick="switchTab('tabForm', event)">BUAT LAPORAN</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="switchTab('tabList', event)">RIWAYAT LAPORAN</button>
                </li>
            </ul>

            <div id="tabForm" class="tab-content">
                <div id="reportAlert"></div>
                <form id="reportForm" onsubmit="handleSubmitReport(event)">
                    <input type="hidden" id="reportId">
                    <input type="hidden" id="reportStatus" value="draft">
                    <input type="hidden" id="reportFoto">
                    <input type="hidden" id="reportFotoFilename">
                    <input type="hidden" id="reportTaskforce">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">PILIH TUGAS</label>
                            <select id="reportTugas" class="form-select" onchange="handleTugasChange()" required>
                                <option value="">-- PILIH TUGAS --</option>
                            </select>
                            <div class="form-text" id="tugasHint"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">TANGGAL BERANGKAT</label>
                            <input type="date" id="reportTanggalBerangkat" class="form-control" onchange="handleTanggalBerangkatChange()" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">TANGGAL PULANG</label>
                            <input type="date" id="reportTanggalPulang" class="form-control" onchange="updateSisaKuota()" required>
                        </div>

                        <div class="col-12">
                            <h5 class="section-title">STRUKTUR WILAYAH KERJA</h5>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">TIM</label>
                            <select id="reportTim" class="form-select" onchange="loadTaskforceDropdown()" required>
                                <option value="">-- PILIH TIM --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">PML</label>
                            <select id="reportPml" class="form-select" onchange="loadPplDropdown()" required>
                                <option value="">-- PILIH PML --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">PPL</label>
                            <select id="reportPpl" class="form-select" onchange="loadSubslsDropdown()" required>
                                <option value="">-- PILIH PPL --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ID SUBSLS</label>
                            <select id="reportSubsls" class="form-select" onchange="loadSubslsDetail()" required>
                                <option value="">-- PILIH ID_SUBSLS --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">NAMA SLS</label>
                            <input type="text" id="reportNamaSls" class="form-control bg-light" readonly>
                        </div>

                        <div class="col-md-3 col-6">
                            <label class="form-label small text-muted">TOTAL ASSIGNMENT</label>
                            <input type="text" id="reportTotalAssigment" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label small text-muted">MUATAN KK</label>
                            <input type="text" id="reportMuatanKk" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label small text-muted">MUATAN USAHA</label>
                            <input type="text" id="reportMuatanUsaha" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3 col-6">
                            <label class="form-label small text-muted">TOTAL MUATAN</label>
                            <input type="text" id="reportTotalMuatan" class="form-control bg-light" readonly>
                        </div>

                        <div class="col-12">
                            <h5 class="section-title">CAPAIAN KINERJA & LAMPIRAN</h5>
                        </div>

                        <div class="col-12">
                            <label class="form-label">URAIAN KEGIATAN</label>
                            <textarea id="reportUraian" class="form-control" rows="3" placeholder="Tuliskan detail progres lapangan hari ini..." required></textarea>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label text-muted">JUMLAH KUNJUNGAN (OTOMATIS)</label>
                            <input type="text" id="reportKunjungan" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">SISA KUOTA</label>
                            <input type="text" id="reportSisaKuota" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">TITIK KOORDINAT</label>
                            <div class="input-group">
                                <input type="text" id="reportKoordinat" class="form-control" readonly required>
                                <button type="button" class="btn btn-outline-secondary fw-bold" onclick="getLocation()">📍 GPS</button>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">NOMOR SURAT TUGAS</label>
                            <input type="text" id="reportNoSurat" class="form-control" placeholder="Contoh: ST-001/...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">TANGGAL SURAT TUGAS</label>
                            <input type="date" id="reportTglSurat" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">DOKUMENTASI FOTO LAPANGAN (FOTO AKAN DIKOMPRES OTOMATIS)</label>
                            <input type="file" class="form-control" accept="image/*" onchange="handleFileSelect(event)">
                            <div id="fotoPreview"></div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-secondary w-50" onclick="setStatus('draft')">SIMPAN DRAFT</button>
                        <button type="submit" class="btn btn-primary w-50" onclick="setStatus('final')">KIRIM FINAL</button>
                    </div>
                    <div class="mt-2 text-center">
                        <button type="button" id="btnBatalEdit" class="btn btn-outline-secondary btn-sm w-100" style="display:none;" onclick="batalEdit()">BATAL EDIT &amp; BUAT LAPORAN BARU</button>
                    </div>
                </form>
            </div>

            <div id="tabList" class="tab-content" style="display: none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold text-uppercase">RIWAYAT PELAPORAN ANDA</h6>
                    <select id="filterStatus" class="form-select form-select-sm w-auto fw-bold text-uppercase" onchange="loadReports()">
                        <option value="">SEMUA STATUS</option>
                        <option value="draft">DRAFT</option>
                        <option value="final">FINAL</option>
                    </select>
                </div>
                <div id="reportListContainer"></div>
            </div>

        </div>
    </div>
</div>

<div id="printArea" class="print-only"></div>

<div id="confirmModalOverlay" class="confirm-modal-overlay">
    <div class="confirm-modal-box">
        <h6 id="confirmModalTitle">KONFIRMASI</h6>
        <p id="confirmModalBody">Apakah Anda yakin?</p>
        <div class="d-flex gap-2">
            <button type="button" id="confirmModalCancelBtn" class="btn btn-outline-secondary btn-sm w-50 fw-bold">BATAL</button>
            <button type="button" id="confirmModalOkBtn" class="btn btn-danger btn-sm w-50 fw-bold">YA, LANJUTKAN</button>
        </div>
    </div>
</div>

<script>

    const CONFIG = {
        WEBAPP_URL: 'https://script.google.com/macros/s/AKfycbz4knmevLePPyCO8Yxh5qr5w0X0c_00qP6pmzStz5fdmr2_3M6PHhuqcoGJ8aBoIJOi9g/exec',
        KUOTA_DEFAULT: 20,
        MAX_PHOTO_SIZE: 500 * 1024
    };

    let state = { nip: '', taskforce: '', isLoggedIn: false };

    function showAlert(containerId, message, type) {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="alert alert-${type} py-2 small fw-bold">${message}</div>`;
    }

    function clearAlert(containerId) {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = '';
    }

    // Diubah: Logika fungsi getToday() diubah agar membaca penanggalan lokal browser secara ketat tanpa UTC, mencegah lompat mundur hari
    function getToday() {
        const sekarang = new Date();
        const yyyy = sekarang.getFullYear();
        const mm = String(sekarang.getMonth() + 1).padStart(2, '0');
        const dd = String(sekarang.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    async function callApi(params) {
        const url = new URL(CONFIG.WEBAPP_URL);
        for (const [key, value] of Object.entries(params)) {
            url.searchParams.set(key, String(value).trim());
        }
        try {
            const response = await fetch(url.toString(), { method: 'GET', mode: 'cors' });
            if (!response.ok) throw new Error();
            return await response.json();
        } catch (err) {
            return await callApiJsonp(params);
        }
    }

    function callApiJsonp(params) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_' + Date.now();
            const url = new URL(CONFIG.WEBAPP_URL);
            for (const [key, value] of Object.entries(params)) {
                url.searchParams.set(key, String(value).trim());
            }
            url.searchParams.set('callback', callbackName);

            const script = document.createElement('script');
            script.src = url.toString();

            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            script.onerror = () => reject(new Error('Koneksi server gagal.'));
            document.body.appendChild(script);
        });
    }

    const UPLOAD_TIMEOUT_MS = 45000;

    async function uploadPhotoToServer(base64Data, filename, tim, taskforce, id) {
        const formData = new FormData();
        formData.append('action', 'uploadPhoto');
        formData.append('base64Data', base64Data);
        formData.append('filename', filename);
        formData.append('tim', tim || '');
        formData.append('taskforce', taskforce || '');
        formData.append('id', id || '');

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), UPLOAD_TIMEOUT_MS);

        try {
            const response = await fetch(CONFIG.WEBAPP_URL, {
                method: 'POST',
                body: formData,
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!response.ok) {
                throw new Error('Server menolak permintaan upload (status ' + response.status + ').');
            }

            let result;
            try {
                result = await response.json();
            } catch (parseErr) {
                throw new Error('Respon server tidak valid saat upload foto. Coba lagi atau gunakan foto yang lebih kecil.');
            }
            return result;

        } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') {
                throw new Error('UPLOAD FOTO TERLALU LAMA (TIMEOUT). Periksa koneksi internet Anda atau coba dengan foto yang lebih kecil.');
            }
            throw new Error('Gagal terhubung ke server saat upload foto: ' + err.message);
        }
    }

    async function handleLogin(event) {
        event.preventDefault();
        const nip = document.getElementById('loginNip').value.trim();
        const taskforce = document.getElementById('loginTaskforce').value;
        const email = document.getElementById('loginEmail').value.trim();
        const btn = document.getElementById('loginBtn');

        btn.disabled = true;
        btn.textContent = 'MEMPROSES...';
        clearAlert('loginAlert');

        try {
            let result = await callApi({ action: 'login', nip: nip, taskforce: taskforce });
            if (!result.success) {
                showAlert('loginAlert', '❌ ' + result.message.toUpperCase(), 'danger');
                btn.disabled = false; btn.textContent = 'MASUK';
                return;
            }

            if (result.stage === 'choose_name') {
                const select = document.getElementById('loginTaskforce');
                select.innerHTML = '<option value="">-- PILIH TASKFORCE --</option>';
                result.options.forEach(opt => {
                    select.innerHTML += `<option value="${opt.taskforce.trim()}">${opt.taskforce.trim().toUpperCase()}</option>`;
                });
                document.getElementById('taskforceGroup').style.display = 'block';
                showAlert('loginAlert', 'ℹ️ SILAKAN PILIH NAMA TASKFORCE ANDA.', 'info');
            } 
            else if (result.stage === 'logged_in') {
                if (result.needEmail && !email) {
                    showAlert('loginAlert', '📧 MASUKKAN EMAIL UNTUK REGISTRASI AWAL.', 'warning');
                    document.getElementById('emailGroup').style.display = 'block';
                } else {
                    if (result.needEmail && email) {
                        await callApi({ action: 'saveEmail', nip: nip, taskforce: taskforce, email: email });
                    }
                    state.nip = result.nip;
                    state.taskforce = result.taskforce;
                    
                    try { localStorage.setItem('lastNip', result.nip); } catch (e) {}
                    
                    document.getElementById('userNipDisplay').textContent = result.nip;
                    document.getElementById('userTaskforceDisplay').textContent = result.taskforce.toUpperCase();
                    document.getElementById('reportTaskforce').value = result.taskforce;
                    
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('reportPanel').style.display = 'block';
                    
                    await loadTugasOptions();
                    await loadTimDropdown();
                    loadReports();
                }
            }
        } catch (err) {
            showAlert('loginAlert', '❌ TERJADI GALAT: ' + err.message.toUpperCase(), 'danger');
        }
        btn.disabled = false; btn.textContent = 'MASUK';
    }

    function handleLogout() {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('reportPanel').style.display = 'none';
        document.getElementById('loginForm').reset();
        resetForm();

        try {
            const savedNip = localStorage.getItem('lastNip');
            if (savedNip) {
                document.getElementById('loginNip').value = savedNip;
            }
        } catch (e) {}
    }

    function switchTab(tabId, event) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('#reportTabs .nav-link').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).style.display = 'block';
        if (event && event.target) {
            event.target.classList.add('active');
        }
        if (tabId === 'tabList') loadReports();
    }

    function updateSisaKuota() {
        const berangkatStr = document.getElementById('reportTanggalBerangkat').value;
        const pulangStr = document.getElementById('reportTanggalPulang').value;
        
        if (!berangkatStr || !pulangStr) {
            document.getElementById('reportKunjungan').value = '';
            document.getElementById('reportSisaKuota').value = '';
            return;
        }

        const berangkat = new Date(berangkatStr + 'T00:00:00');
        const pulang = new Date(pulangStr + 'T00:00:00');
        const MS_PER_DAY = 24 * 60 * 60 * 1000;
        const jumlahHari = Math.round((pulang - berangkat) / MS_PER_DAY) + 1;

        if (jumlahHari < 1) {
            document.getElementById('reportKunjungan').value = 'TANGGAL TIDAK VALID';
            document.getElementById('reportSisaKuota').value = '';
            return;
        }
        document.getElementById('reportKunjungan').value = jumlahHari;
        document.getElementById('reportSisaKuota').value = CONFIG.KUOTA_DEFAULT - jumlahHari;
    }

    const PHOTO_MAX_DIMENSION = 1280;
    const PHOTO_JPEG_QUALITY = 0.7;

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (!file.type || !file.type.startsWith('image/')) {
            alert('BERKAS HARUS BERUPA FOTO/GAMBAR!');
            event.target.value = '';
            return;
        }
        document.getElementById('reportFotoFilename').value = 'photo.jpg';
        document.getElementById('fotoPreview').innerHTML = '<div class="small text-muted fw-bold">⏳ MEMPROSES FOTO...</div>';
        compressImageFile(file, PHOTO_MAX_DIMENSION, PHOTO_JPEG_QUALITY)
         .then(function(dataUrl) {
             document.getElementById('reportFoto').value = dataUrl;
             document.getElementById('fotoPreview').innerHTML = `<img src="${dataUrl}" class="photo-preview">`;
             const approxKb = Math.round((dataUrl.length * 0.75) / 1024);
             document.getElementById('fotoPreview').innerHTML += `<div class="small text-muted mt-1">UKURAN SETELAH KOMPRESI: ~${approxKb} KB</div>`;
         })
         .catch(function(err) {
             alert('GAGAL MEMPROSES FOTO: ' + err.message);
             document.getElementById('fotoPreview').innerHTML = '';
             event.target.value = '';
         });
    }

    function compressImageFile(file, maxDimension, quality) {
        return new Promise(function(resolve, reject) {
            const reader = new FileReader();
            reader.onerror = function() { reject(new Error('Gagal membaca berkas foto.')); };
            reader.onload = function(evt) {
                const img = new Image();
                img.onerror = function() { reject(new Error('Format berkas gambar tidak didukung.')); };
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = Math.round((height * maxDimension) / width);
                            width = maxDimension;
                        } else {
                            width = Math.round((width * maxDimension) / height);
                            height = maxDimension;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function executeSubmitReport() {
        clearAlert('reportAlert');
        const submitButtons = document.querySelectorAll('#reportForm button[type="submit"]');
        submitButtons.forEach(b => b.disabled = true);

        const id = document.getElementById('reportId').value.trim();
        const status = document.getElementById('reportStatus').value;
        const tasks = document.getElementById('reportTugas').value;
        const berangkat = document.getElementById('reportTanggalBerangkat').value;
        const pulang = document.getElementById('reportTanggalPulang').value;
        const tim = document.getElementById('reportTim').value;
        const pml = document.getElementById('reportPml').value;
        const ppl = document.getElementById('reportPpl').value;
        const subsls = document.getElementById('reportSubsls').value;
        const namaSls = document.getElementById('reportNamaSls').value;
        const totalAss = document.getElementById('reportTotalAssigment').value;
        const muatanKk = document.getElementById('reportMuatanKk').value;
        const muatanUsaha = document.getElementById('reportMuatanUsaha').value;
        const totalMuatan = document.getElementById('reportTotalMuatan').value;
        const uraian = document.getElementById('reportUraian').value.trim();
        const kunjungan = document.getElementById('reportKunjungan').value;
        const sisaKuota = document.getElementById('reportSisaKuota').value;
        const koordinat = document.getElementById('reportKoordinat').value;
        const noSurat = document.getElementById('reportNoSurat').value.trim();
        const tglSurat = document.getElementById('reportTglSurat').value;
        const base64Foto = document.getElementById('reportFoto').value;
        const fotoFilename = document.getElementById('reportFotoFilename').value;

        const payload = {
            action: 'saveReport',
            id: id,
            status: status,
            nip: state.nip,
            taskforce: state.taskforce,
            tugas: tasks,
            tanggalBerangkat: berangkat,
            tanggalPulang: pulang,
            tim: tim,
            pml: pml,
            ppl: ppl,
            idSubsls: subsls,
            namaSls: namaSls,
            totalAssignment: totalAss,
            muatanKk: muatanKk,
            muatanUsaha: muatanUsaha,
            totalMuatan: totalMuatan,
            uraian: uraian,
            jumlahKunjungan: kunjungan,
            sisaKuota: sisaKuota,
            titikKoordinat: koordinat,
            nomorSuratTugas: noSurat,
            tanggalSuratTugas: tglSurat
        };

        try {
            let res = await callApi(payload);
            if (!res.success) {
                throw new Error(res.message || 'Gagal menyimpan baris data laporan.');
            }
            
            const savedId = res.id || id;
            if (base64Foto && base64Foto.startsWith('data:image')) {
                showAlert('reportAlert', '⏳ DATA STRUKTUR TERSIMPAN. SEKARANG MENGUNGGAH FOTO LAPORAN...', 'info');
                let uploadRes = await uploadPhotoToServer(base64Foto, fotoFilename, tim, state.taskforce, savedId);
                if (!uploadRes.success) {
                    throw new Error('Data teks masuk, tapi FOTO GAGAL: ' + uploadRes.message);
                }
            }

            showAlert('reportAlert', '✅ LAPORAN BERHASIL DISIMPAN!', 'success');
            resetForm();
            setTimeout(() => { switchTab('tabList'); }, 1000);
        } catch (err) {
            showAlert('reportAlert', '❌ ERROR: ' + err.message.toUpperCase(), 'danger');
        }
        submitButtons.forEach(b => b.disabled = false);
    }

    function renderReportsList() {
        const container = document.getElementById('reportListContainer');
        const filter = document.getElementById('filterStatus').value;
        
        let filtered = reportsCache;
        if (filter) {
            filtered = reportsCache.filter(r => norm(r.status) === norm(filter));
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="text-center py-3 text-muted fw-bold">TIDAK ADA DATA LAPORAN.</div>';
            return;
        }

        // Diubah: Logika fungsi pemotongan format tanggal (.split('T')[0]) agar riwayat cetak tabel tidak terpotong timezone mundur semalam
        const formatTglStr = (val) => {
            if(!val) return '-';
            const clean = String(val).split('T')[0];
            const parts = clean.split('-');
            if(parts.length !== 3) return clean;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        let html = '<div class="row g-2">';
        filtered.forEach(r => {
            const isFinal = norm(r.status) === 'final';
            const statusBadge = isFinal ? '<span class="badge bg-success">FINAL</span>' : '<span class="badge bg-warning text-dark">DRAFT</span>';
            
            let printBtn = '';
            if (isFinal) {
                printBtn = `<button type="button" class="btn btn-outline-dark btn-sm fw-bold btn-print" onclick="printReport('${r.id}')">🖨️ CETAK</button>`;
            }

            let dropdownMenu = '';
            if (!isFinal) {
                dropdownMenu = `
                    <div class="position-relative">
                        <button type="button" class="btn btn-outline-secondary btn-sm fw-bold" onclick="toggleReportMenu('${r.id}', event)">⋮ MENU</button>
                        <div id="dropdown-${r.id}" class="report-menu-dropdown" style="display:none;">
                            <button type="button" class="report-menu-item text-danger" onclick="deleteReport('${r.id}')">🗑️ HAPUS DRAFT</button>
                        </div>
                    </div>
                `;
            }

            let editBtn = '';
            if (!isFinal) {
                editBtn = `<button type="button" class="btn btn-outline-primary btn-sm fw-bold" onclick="editReport('${r.id}')">✏️ EDIT</button>`;
            }

            html += `
                <div class="col-12">
                    <div class="card p-3 border position-relative shadow-sm" style="background:#fff;">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fw-bold text-primary text-uppercase" style="font-size:15px;">📋 ID: ${r.id}</span>
                            <div>${statusBadge}</div>
                        </div>
                        <div class="small mb-1 text-dark"><strong>TUGAS:</strong> ${String(r.tugas).toUpperCase()}</div>
                        <div class="small mb-2 text-muted">🗓️ ${formatTglStr(r.tanggal_berangkat)} s/d ${formatTglStr(r.tanggal_pulang)}</div>
                        <div class="p-2 rounded bg-light border text-dark mb-2" style="font-size:14px; white-space:pre-line;">${r.uraian || '-'}</div>
                        <div class="d-flex gap-2">
                            ${editBtn}
                            ${printBtn}
                            ${dropdownMenu}
                        </div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function getLocation() {
        const coordInput = document.getElementById('reportKoordinat');
        coordInput.value = '⏳ MENCARI KOORDINAT GPS...';
        
        if (!navigator.geolocation) {
            alert('GEOLOCATION TIDAK DIDUKUNG OLEH BROWSER / HP ANDA.');
            coordInput.value = '';
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                coordInput.value = pos.coords.latitude.toFixed(7) + ', ' + pos.coords.longitude.toFixed(7);
            },
            function(err) {
                alert('GAGAL MENDAPATKAN LOKASI GPS (' + err.message + '). PASTIKAN IZIN LOKASI DI HP SUDAH DIAKTIFKAN.');
                coordInput.value = '';
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function printReport(id) {
        const found = reportsCache.find(r => String(r.id).trim() === String(id).trim());
        if (!found) return;

        const formatTgl = (val) => {
            if(!val) return '-';
            const clean = String(val).split('T')[0];
            const p = clean.split('-');
            if(p.length !== 3) return clean;
            return `${p[2]}/${p[1]}/${p[0]}`;
        };

        const printArea = document.getElementById('printArea');
        printArea.innerHTML = `
            <div class="print-page">
                <div class="print-header">
                    <h2>TANDA TERIMA BUKTI PELAPORAN LAPANGAN</h2>
                    <p>SISTEM MONITORING & TARGET PELAKSANAAN TIM KERJA</p>
                </div>
                <table class="print-table">
                    <tr><td class="label">ID LAPORAN</td><td><strong>${found.id}</strong></td></tr>
                    <tr><td class="label">STATUS LAPORAN</td><td>FINAL</td></tr>
                    <tr><td class="label">NOMOR / TGL SURAT TUGAS</td><td>${found.nomor_surat_tugas || '-'} / ${formatTgl(found.tanggal_surat_tugas)}</td></tr>
                    <tr><td class="label">NIP / TASKFORCE</td><td>${found.nip || '-'} / ${String(found.taskforce).toUpperCase()}</td></tr>
                    <tr><td class="label">JENIS TUGAS / CAPAIAN HARI</td><td>${String(found.tugas).toUpperCase()} (${found.jumlah_kunjungan || '1'} HARI KERJA)</td></tr>
                    <tr><td class="label">PERIODE TUGAS</td><td>${formatTgl(found.tanggal_berangkat)} s/d ${formatTgl(found.tanggal_pulang)}</td></tr>
                    <tr><td class="label">TIM / PML / PPL</td><td>TIM ${found.tim || '-'} / PML: ${found.pml || '-'} / PPL: ${found.ppl || '-'}</td></tr>
                    <tr><td class="label">WILAYAH KERJA (SUBSLS)</td><td>ID: ${found.id_subsls || '-'} (${found.nama_sls || '-'})</td></tr>
                    <tr><td class="label">MUATAN LOKASI</td><td>ASSIGNMENT: ${found.total_assignment || '0'} | KK: ${found.muatan_kk || '0'} | USAHA: ${found.muatan_usaha || '0'} | TOTAL: ${found.total_muatan || '0'}</td></tr>
                    <tr><td class="label">KOORDINAT LOKASI (GPS)</td><td>${found.titik_koordinat || '-'}</td></tr>
                </table>
                <div class="print-uraian">
                    <strong>URAIAN PROGRESS KEGIATAN LAPANGAN:</strong>
                    <div class="kotak" style="white-space: pre-line;">${found.uraian || '-'}</div>
                </div>
                ${found.foto_url ? `<div class="print-foto"><strong>DOKUMENTASI DILAMPIRKAN:</strong><br><img src="${found.foto_url}"></div>` : ''}
                <div class="print-signature">
                    <div class="sign-block">Mengetahui,<br>Pengawas Lapangan (PML)<div class="sign-line">${found.pml || '........................................'}</div></div>
                    <div class="sign-block">Petugas Lapangan (Taskforce)<div class="sign-line">${state.taskforce.toUpperCase()}</div></div>
                </div>
            </div>
        `;

        window.print();
    }

    function norm(val) {
        return String(val == null ? '' : val).trim().toLowerCase();
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('reportTanggalBerangkat').value = getToday();
        document.getElementById('reportTanggalPulang').value = getToday();
        updateSisaKuota();

        try {
            const savedNip = localStorage.getItem('lastNip');
            if (savedNip) {
                document.getElementById('loginNip').value = savedNip;
            }
        } catch (e) {}
    });
</script>
</body>
</html>
